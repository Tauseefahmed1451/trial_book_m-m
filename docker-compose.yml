services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bookgen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "8501:8501"
    volumes:
      - ./:/app

volumes:
  postgres_data:
